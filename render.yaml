services:
  - type: web
    name: rag-ask-your-doc
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.10.0
